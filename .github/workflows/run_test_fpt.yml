name: Backtest FPT

on:
  workflow_dispatch:

jobs:
  run_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests vnstock3

      - name: Run Backtest FPT
        # Đảm bảo lệnh này gọi đúng file python bạn đã tạo
        run: python backtest_fpt.py