name: Backtest Bot

on:
  workflow_dispatch:

jobs:
  backtest_bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install vnstock pandas requests numpy python-telegram-bot

      - name: Run backtest bot
        run: python backtest_bot_2.py

      - name: Upload CSV results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ket_qua_scanall
          path: ket_qua_scanall_*.csv
