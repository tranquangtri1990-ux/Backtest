name: All-in-One Bot

on:
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install requests truoc khi chay installer
        run: pip install requests

      - name: Install vnstock-cli (kich hoat Bronze 180 req/phut)
        run: |
          wget -q https://vnstocks.com/files/vnstock-cli-installer.run -O installer.run
          chmod +x installer.run
          ./installer.run -- --non-interactive --api-key "vnstock_3519cd0014af8858dc6b96d189b8875e"

      - name: Install dependencies vao venv bang uv
        run: |
          uv pip install --python /home/runner/.venv/bin/python \
            pandas numpy requests "python-telegram-bot==20.7"
          echo "=== Kiem tra ==="
          /home/runner/.venv/bin/python -c "import telegram; print('telegram OK')"
          /home/runner/.venv/bin/python -c "import vnstock_data; print('vnstock_data OK')"
          /home/runner/.venv/bin/python -c "from vnstock import Vnstock; print('vnstock OK')"

      - name: Run All-in-One Bot
        run: /home/runner/.venv/bin/python backtest_bot_v4.py
        env:
          VNSTOCK_API_KEY: "vnstock_3519cd0014af8858dc6b96d189b8875e"

      - name: Upload ket qua CSV (neu co)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ket_qua_bot
          path: |
            ket_qua_scanall_*.csv
            ket_qua_weekly_*.csv
            vn_stocks_full.txt

      - name: Commit vn_stocks_full.txt neu duoc cap nhat
        if: always()
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git add vn_stocks_full.txt || true
          git diff --cached --quiet && echo 'No changes' && exit 0
          git commit -m 'Auto update vn_stocks_full.txt'
          git pull --rebase origin main
          git push origin main
