name: Backtest Bot

on:
  workflow_dispatch:

jobs:
  backtest_bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install requests truoc khi chay installer
        run: pip install requests

      - name: Install vnstock-cli (kich hoat Bronze 180 req/phut)
        run: |
          wget -q https://vnstocks.com/files/vnstock-cli-installer.run -O installer.run
          chmod +x installer.run
          ./installer.run -- --non-interactive --api-key "vnstock_3519cd0014af8858dc6b96d189b8875e"

      - name: Tim kiem venv va module
        run: |
          echo "=== Tim tat ca venv ==="
          find /home/runner -name "activate" 2>/dev/null
          find /opt -name "activate" 2>/dev/null
          echo "=== Thu pip list vnstock (system) ==="
          pip list | grep -i vnstock || echo "Khong co vnstock o system"
          echo "=== Tim vnstock trong site-packages ==="
          find / -name "vnstock*" -type d 2>/dev/null | head -20

      - name: Install dependencies va run
        run: |
          pip install pandas numpy python-telegram-bot
          echo "=== pip list vnstock sau install ==="
          pip list | grep -i vnstock
          python backtest_bot_2.py
        env:
          VNSTOCK_API_KEY: "vnstock_3519cd0014af8858dc6b96d189b8875e"

      - name: Upload CSV results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ket_qua_scanall
          path: ket_qua_scanall_*.csv
