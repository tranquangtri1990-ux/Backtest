name: Backtest Bot

on:
workflow_dispatch:

jobs:
backtest_bot:
runs-on: ubuntu-latest
timeout-minutes: 360

```
steps:
  - uses: actions/checkout@v4

  - name: Install requests truoc khi chay installer
    run: pip install requests

  - name: Install vnstock-cli (kich hoat Bronze 180 req/phut)
    run: |
      wget -q https://vnstocks.com/files/vnstock-cli-installer.run -O installer.run
      chmod +x installer.run
      ./installer.run -- --non-interactive --api-key "vnstock_3519cd0014af8858dc6b96d189b8875e"

  - name: Install dependencies vao venv bang uv
    run: |
      uv pip install --python /home/runner/.venv/bin/python pandas numpy "python-telegram-bot==20.7"
      echo "=== Kiem tra ==="
      /home/runner/.venv/bin/python -c "import telegram; print('telegram OK')"
      /home/runner/.venv/bin/python -c "import vnstock_data; print('vnstock_data OK')"
      /home/runner/.venv/bin/python -c "from vnstock import Vnstock; print('vnstock Vnstock OK')"

  - name: Run backtest bot
    run: /home/runner/.venv/bin/python backtest_bot_2.py
    env:
      VNSTOCK_API_KEY: "vnstock_3519cd0014af8858dc6b96d189b8875e"

  - name: Upload CSV results as artifact
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: ket_qua_scanall
      path: ket_qua_scanall_*.csv
```