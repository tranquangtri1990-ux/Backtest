name: Backtest Bot

on:
  workflow_dispatch:

jobs:
  backtest_bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        # Sửa lỗi: Cài đặt vnstock3 thay vì vnstock cũ
        run: |
          pip install pandas requests numpy python-telegram-bot vnstock3

      - name: Run backtest bot
        # Đảm bảo tên file này khớp với file .py của bạn
        run: python backtest_bot.py

      - name: Upload CSV results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ket_qua_scanall
          path: ket_qua_scanall_*.csv