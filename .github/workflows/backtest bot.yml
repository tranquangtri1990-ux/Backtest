name: Backtest Bot

on:
  workflow_dispatch:

jobs:
  backtest_bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        # Ép cài đặt vnstock3 và các thư viện liên quan
        run: |
          pip install --upgrade pip
          pip install pandas requests numpy python-telegram-bot vnstock3

      - name: Run backtest bot
        # Đảm bảo tên file .py của ní đúng là backtest_bot.py
        run: python backtest_bot.py